# Block PRs that add dependencies with known vulnerabilities or bad licenses.
# Requires the repo's Dependency graph to be enabled (Settings -> Code security).
# Private repos need GitHub Advanced Security; if unavailable, use OSV-Scanner instead.
name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

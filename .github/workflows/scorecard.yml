# OpenSSF Scorecard: scores the repo's security posture and uploads to code scanning.
# NOTE: ossf/scorecard-action has NO floating major (v2) tag — pin an exact release.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '21 5 * * 1'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      # id-token needed only when publish_results: true (public repos). Remove for private.
      id-token: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # PUBLIC repo: true (enables the score badge). PRIVATE: false (and drop id-token above).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
